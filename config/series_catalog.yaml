# ============================================================
# Catálogo de Series — Banco Central de Chile (BDE API)
# Documentación: https://si3.bcentral.cl/estadisticas/Principal1/Web_Services/index.htm
# ============================================================

bcentral:
  # --- Actividad Económica (Trimestral) ---
  - id: F032.PIB.FLU.R.CLP.EP18.Z.Z.0.T
    name: PIB Real (encadenado 2018)
    category: actividad
    frequency: quarterly
    unit: millones_CLP_2018
    description: Producto Interno Burto real, acumulado trimestral

  # --- Precios (Mensual) ---
  - id: G073.IPC.IND.2023.M
    name: IPC General (Base 2023=100)
    category: precios
    frequency: monthly
    unit: indice
    description: Índice de Precios al Consumidor General, base diciembre 2023

  - id: G073.IPC.VAR.2023.M
    name: IPC Variación mensual
    category: precios
    frequency: monthly
    unit: porcentaje
    description: Variación mensual del IPC base 2023

  - id: G073.IPC.V12.2023.M
    name: IPC Variación anual (inflación 12M)
    category: precios
    frequency: monthly
    unit: porcentaje
    description: Variación anual (12 meses) del IPC base 2023

  # --- Política Monetaria (Diaria) ---
  - id: F022.TPM.TIN.D001.NO.Z.D
    name: Tasa de Política Monetaria (TPM)
    category: politica_monetaria
    frequency: daily
    unit: porcentaje_anual
    description: Tasa de política monetaria nominal diaria

  # --- Mercado Laboral (Mensual) ---
  - id: F049.DES.TAS.INE.10.M
    name: Tasa de Desempleo
    category: laboral
    frequency: monthly
    unit: porcentaje
    description: Tasa de desocupación nacional mensual INE

  # --- Tipo de Cambio (Diario y Mensual) ---
  - id: F073.TCO.PRE.Z.D
    name: Tipo de Cambio CLP/USD (diario)
    category: tipo_de_cambio
    frequency: daily
    unit: CLP_por_USD
    description: Tipo de cambio nominal observado diario

  - id: F073.TCO.PRE.HIST.M
    name: Tipo de Cambio CLP/USD (promedio mensual)
    category: tipo_de_cambio
    frequency: monthly
    unit: CLP_por_USD
    description: Promedio mensual histórico del tipo de cambio observado

  # --- Sector Externo (Trimestral) ---
  - id: F068.A.FLU.Z.0.S.N.Z.Z.Z.Z.6.0.T
    name: Balanza de Pagos - Cuenta Corriente
    category: sector_externo
    frequency: quarterly
    unit: millones_USD
    description: Saldo de cuenta corriente de la balanza de pagos (millones de dólares)

  - id: F051.D7.PPB.C.Z.Z.T
    name: Deuda GC (% PIB)
    category: fiscal
    frequency: quarterly
    unit: porcentaje
    description: Deuda bruta del Gobierno Central como porcentaje del PIB trimestral

  # --- Precios de Materias Primas (Mensual) ---
  - id: F019.PPB.PRE.40.M
    name: Precio del Cobre (BML)
    category: materias_primas
    frequency: monthly
    unit: centavos_USD_por_libra
    description: Precio del cobre refinado BML mensual (dólares/libra)

  # ============================================================
  # Fase 2 — Series adicionales del Banco Central (UF, UTM, IVP, IMACEC)
  # ============================================================
  - id: F073.UFF.PRE.Z.D
    name: Unidad de Fomento (UF)
    category: precios_uf
    frequency: daily
    unit: CLP
    description: Valor de la Unidad de Fomento diaria

  - id: F073.IVP.PRE.Z.D
    name: Índice de Valor Promedio (IVP)
    category: precios_ivp
    frequency: daily
    unit: CLP
    description: Valor del Índice de Valor Promedio diario

  - id: F073.UTR.PRE.Z.M
    name: Unidad Tributaria Mensual (UTM)
    category: precios_utm
    frequency: monthly
    unit: CLP
    description: Valor de la Unidad Tributaria Mensual

  - id: F032.ICF.IND.Z.Z.EP18.Z.Z.0.M
    name: IMACEC mensual (Base 2018)
    category: actividad_mensual
    frequency: monthly
    unit: indice
    description: Imacec a costo de factores, serie empalmada (índice 2018=100)
